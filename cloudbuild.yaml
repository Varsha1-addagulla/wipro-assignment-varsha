# Cloud Build -> Artifact Registry -> Cloud Run
#
# GCP project:
#   Name:   My First Project
#   Number: 278595266473
#   ID:     project-c578a9e8-e300-4241-b6d
#
# Required one-time IAM on the build service account (278595266473-compute@...):
#   roles/logging.logWriter
#   roles/iam.serviceAccountUser (on itself)
#   roles/run.admin
#   roles/artifactregistry.writer
#   roles/secretmanager.secretAccessor (for GROQ_API_KEY)
#
# Build identity must stay as a literal resource name — Cloud Build does not
# expand user-defined substitutions ($_...) in this field.

substitutions:
  _GCP_PROJECT_ID: project-c578a9e8-e300-4241-b6d
  _REGION: us-central1
  _AR_REPOSITORY: app
  _SERVICE_NAME: loan-risk-multiagent
  _GROQ_SECRET_NAME: GROQ_API_KEY

serviceAccount: projects/project-c578a9e8-e300-4241-b6d/serviceAccounts/278595266473-compute@developer.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install-and-test
    name: python:3.11.10-slim
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        pip install --no-cache-dir -r requirements-dev.txt
        ruff check .
        pytest -q --cov --cov-report=term-missing

  - id: docker-build
    name: gcr.io/cloud-builders/docker
    waitFor: ["install-and-test"]
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest
      - .

  - id: docker-push-sha
    name: gcr.io/cloud-builders/docker
    waitFor: ["docker-build"]
    args:
      - push
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA

  - id: docker-push-latest
    name: gcr.io/cloud-builders/docker
    waitFor: ["docker-build"]
    args:
      - push
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    waitFor: ["docker-push-sha"]
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
      - --project
      - $_GCP_PROJECT_ID
      - --region
      - $_REGION
      - --platform
      - managed
      - --port
      - "8080"
      - --memory
      - "1Gi"
      - --cpu
      - "1"
      - --timeout
      - "300"
      - --concurrency
      - "40"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --allow-unauthenticated
      - --set-secrets
      - GROQ_API_KEY=$_GROQ_SECRET_NAME:latest
      - --set-env-vars
      - LOG_LEVEL=INFO,ENVIRONMENT=production
      - --quiet
      - --verbosity=info

images:
  - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest
