# Cloud Build → Artifact Registry → Cloud Run
#
# GCP project (this repo / trigger target):
#   Name:   My First Project
#   Number: 278595266473
#   ID:     project-c578a9e8-e300-4241-b6d
#
# IAM (run once in Cloud Shell if builds show "Logs Writer" errors):
#   gcloud projects add-iam-policy-binding project-c578a9e8-e300-4241-b6d \
#     --member="serviceAccount:278595266473-compute@developer.gserviceaccount.com" \
#     --role="roles/logging.logWriter"
#
# Build identity: serviceAccount must be a literal resource name (no $_ vars in this field).
# Trigger: set "Service account" to 278595266473-compute@developer.gserviceaccount.com
#
# Deploy omits --service-account so Cloud Run uses the default runtime identity
# (Compute Engine default SA in this project).

substitutions:
  _GCP_PROJECT_ID: project-c578a9e8-e300-4241-b6d
  _REGION: us-central1
  _AR_REPOSITORY: app
  _SERVICE_NAME: loan-risk-multiagent

serviceAccount: projects/project-c578a9e8-e300-4241-b6d/serviceAccounts/278595266473-compute@developer.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
      - --project
      - $_GCP_PROJECT_ID
      - --region
      - $_REGION
      - --platform
      - managed
      - --port
      - "8080"
      - --memory
      - "1Gi"
      - --cpu
      - "1"
      - --timeout
      - "300"
      - --concurrency
      - "40"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --allow-unauthenticated
      - --quiet
      - --verbosity=info

images:
  - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$_GCP_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:latest
